site_name: one-to-many
site_description: Cheap world model — one recorded episode into many, via mono-depth point clouds + inpainting (splatting optional)
theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
docs_dir: docs

nav:
  - Home: index.md
  - Data: data.md
  - Synthetic-data pipeline:
      - World model (design): worldmodel.md
      - Generate synthetic episodes: synthetic_data.md
      - Wrist synthesis — warp, inpaint & GenWarp: genwarp.md
      - Stretch — dynamic objects: stretch_dynamic.md
  - Representations & extensibility: representations.md
  - Alignment (crux): alignment.md
  - Reconstruction (legacy splat):
      - Frame extraction: pipeline/01_frames.md
      - Masking: pipeline/02_masking.md
      - COLMAP poses: pipeline/03_colmap.md
      - Splat training: pipeline/04_splat.md
      - Rendering: pipeline/05_render.md
      - Robot overlay: pipeline/06_robot_overlay.md
  - Data contracts: data_contracts.md
  - Usage: usage.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
