# ============================================================================
# Cheap world model / synthetic-data pipeline config.
#
# Used by: scripts/07_synthesize_episode.py  (module: o2m.worldmodel)
# One recorded episode -> one perturbed, IK-verified, dual-view synthetic episode
# written back in the INPUT dataset format (actions.csv + realsense_color/ +
# zed_color/). Edit the knobs below; every field is read in scripts/07.
# ============================================================================
worldmodel:
  # ---- inputs / provenance -------------------------------------------------
  episode: episode_000
  # Recorded dataset root (episode_NNN live here). Matches configs/dataset.yaml.
  data_root: /home/griffing52/vail/bot2bot/bot2bot/a2l/agilex_data_collection/pick_bag_joe

  # ZED third-person camera calibrated into the robot BASE frame (target-free PnP
  # on the green gripper, ~7px). npz with keys c2w (4x4) and K (3x3).
  zed_extrinsic_npz: ./outputs/episode_000/align/zed_extrinsic.npz
  # Real ZED "clean plate": the scene with the robot inpainted out (SAM mask).
  clean_plate: ./outputs/episode_000/renders/worldmodel/clean_plate_sam.png

  # ---- wrist (RealSense) intrinsics ---------------------------------------
  wrist_intrinsics: {fx: 465.0, fy: 465.0, cx: 320.0, cy: 240.0, width: 640, height: 480}

  # ---- perturbation --------------------------------------------------------
  perturb:
    name: left_up_4_2cm
    # Peak EE offset (metres, robot base frame). +y = robot-left, +z = up.
    # Applied during the approach and converged to 0 at the grasp frame.
    base_offset: [0.0, 0.04, 0.02]
    # bump              : 0 at t=0, up to peak mid-approach, 0 at grasp & after
    #                     (RECOMMENDED). Both runs START identically (home pose) and
    #                     reach the SAME grasp; only the mid-reach deviates.
    # converge_at_grasp : FULL offset at t=0, 0 at grasp & after (starts displaced).
    # constant          : rigid base shift for whole episode (pure failure sim).
    envelope: bump
    # null -> auto-detect the grasp frame from the gripper-closing edge.
    grasp_frame: null
    # IK residual threshold (m/rad). All frames below it -> label "success".
    ik_tol: 5.0e-3

  # ---- gripper fixed-mask trapezoid (wrist warp) --------------------------
  # The wrist gripper is rigid to the camera; its pixels are kept from the
  # ORIGINAL frame (not warped) inside a bottom-centre trapezoid.
  # NOTE: halved width vs the first version (half_top 0.10->0.05, grow 0.35->0.175).
  gripper_mask:
    y_start_frac: 0.70     # trapezoid top, fraction down the image
    half_top: 0.05         # half-width at the top edge (fraction of image width)
    half_grow: 0.175       # extra half-width added by the bottom edge

  # ---- wrist depth source ---------------------------------------------------
  # video : Video-Depth-Anything over the whole frame sequence -> temporally
  #         consistent depth (repo at a2l/video-depth-anything + checkpoint).
  # mono  : old per-frame Depth-Anything-V2 (HF pipeline); flickers on video.
  depth:
    estimator: video
    encoder: vits          # vits | vitb | vitl (video only; vitl = best, ~4GB ckpt)

  # ---- wrist renderer + warp quality --------------------------------------
  # depthwarp : reproject the real frame by depth (fast, real detail).
  # genwarp   : Sony GenWarp diffusion novel-view synthesis (clean disocclusions,
  #             needs a GPU + checkpoints; see docs/genwarp.md).
  # mvgen     : MVGenMaster multi-view diffusion NVS conditioned on SEVERAL real
  #             frames (+ optionally the ZED plate) with known FK cameras
  #             (repo + checkpoints at a2l/MVGenMaster; see docs/mvgenmaster.md).
  wrist_renderer: depthwarp
  warp:
    kernel_splat: true     # 2x2 forward splat -> fewer pin-holes / less spray
    inpaint_holes: true    # master switch for hole filling (false = leave holes)
    # Hole-fill strategy for the disocclusion gaps (depthwarp path):
    #   none | nearest | bilinear | edge_aware | inpaint
    # Compare them all with scripts/09_fill_methods_demo.py.
    fill_method: inpaint

  # ---- GenWarp knobs (only used when wrist_renderer: genwarp) --------------
  # GenWarp shares the same DA-v2 depth + camera offset as the depth-warp; these
  # tune only the generative novel-view synthesis. See docs/genwarp.md.
  genwarp:
    mode: pad              # pad (full frame, recommended) | crop | squash
    depth_scale: 1.0       # <1 exaggerates the shift, >1 shrinks it (parallax ~ 1/depth)
    num_inference_steps: 20  # more -> cleaner, slower
    guidance_scale: 3.5    # higher -> follows the warp more (less drift)

  # ---- MVGenMaster knobs (only used when wrist_renderer: mvgen) -------------
  # Perturbed frames are generated in CHUNKS: each diffusion call conditions on
  # `refs` real frames sampled across the chunk (+ the ZED clean plate when
  # use_zed_ref) with known FK/calibrated cameras, and synthesizes the chunk's
  # perturbed target poses in one pass. Compare conditioning strategies on one
  # frame with scripts/12_mvgen_demo.py. See docs/mvgenmaster.md.
  mvgen:
    ref_depth: dust3r      # dust3r: metric ref depth (DUSt3R locked to FK poses,
                           #         per chunk, recommended) | vda: reuse the
                           #         Video-Depth-Anything depth (pseudo-metric)
    chunk: 6               # perturbed frames per diffusion call
    refs: 3                # real frames used as reference views per chunk
    use_zed_ref: false     # add the ZED clean plate as an extra reference view
    num_inference_steps: 50
    guidance_scale: 2.0
    depth_scale: 1.0       # ref-depth multiplier (vda depth only)
    # dust3r conditioning health: widen the refs beyond the chunk until the FK
    # baseline reaches min_baseline (static/slow segments break the preset-pose
    # solve); if the alignment loss still exceeds max_align_loss (good ~0.001-
    # 0.01, broken 0.5+), that chunk falls back to VDA depth re-anchored to the
    # last well-aligned chunk's metric median.
    min_baseline: 0.06     # ~ the strategy demo's known-good ref span
    max_align_loss: 0.02
    # spread : refs = evenly spaced frames across the baseline-widened chunk
    # nearest: refs = real frames with poses CLOSEST to the perturbed targets
    #          (minimal shift to synthesize; depth solved with spread aux frames)
    # hybrid : global keyframes spread over the live trajectory (SAME for every
    #          chunk -> consistent appearance across chunk boundaries) + per-chunk
    #          nearest refs. Best video cohesion.
    ref_select: hybrid
    rot_weight: 0.1        # m-per-rad rotation term in the pose distance
    near_refs: 2           # per-chunk nearest refs added in hybrid mode

  # ---- third-person occlusion ----------------------------------------------
  # Metric plate depth from scripts/10_zed_metric_scene.py. When present, the
  # robot composite is DEPTH-ORDERED (arm hides behind nearer scene geometry,
  # e.g. the rack). depth_margin absorbs the ~0.1m metric-depth error (the arm
  # only hides when the scene is nearer by MORE than this).
  thirdperson:
    scene_depth_npz: ./outputs/episode_000/align/zed_scene_metric.npz
    depth_margin: 0.12

  # ---- render toggles / range ---------------------------------------------
  render_wrist: true
  render_zed: true
  # [start, end) frame range to synthesise; null = full episode.
  frame_range: null

  # ---- output --------------------------------------------------------------
  # Synthetic episodes are written here, one subdir per perturbation, in the
  # SAME format as the input dataset (drop-in for the LeRobot converter).
  output_root: ./outputs/episode_000/synthetic

# robot.* (urdf paths, frames) are inherited from configs/robot.yaml when this
# file is loaded through the shared config loader.
includes:
  - robot.yaml
